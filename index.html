<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DreamCatcher — write dreams the moment you wake, keep them on this device."
    />
    <title>DreamCatcher</title>
    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0908" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DreamCatcher" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body data-clouds="clear">
    <div class="sky" aria-hidden="true">
      <div class="sky__gradient"></div>
      <div class="sky__glow"></div>
      <div class="sky__haze"></div>
      <canvas id="starfield" class="sky__starfield"></canvas>
      <div class="sky__horizon"></div>
    </div>

    <!-- Soft moon (orb destination) + Sheepy mascot -->
    <div class="moon" id="moon" aria-hidden="true"></div>
    <div class="sheepy" id="sheepy" aria-hidden="true">
      <div class="sheepy__bob">
        <img
          class="sheepy__sprite"
          src="/assets/sheepy.png"
          width="32"
          height="32"
          alt=""
          draggable="false"
        />
        <span class="sheepy__lids"></span>
        <span class="sheepy__mouth"></span>
      </div>
    </div>

    <main class="app">
      <header class="brand">
        <p class="brand-mark">DreamCatcher</p>
        <p class="lede">Dreams disappear faster than you think. Catch them before they fade.</p>
        <p id="sky-caption" class="sky-caption">Lima night sky…</p>
      </header>

      <section class="composer" aria-label="Write a dream">
        <div class="field">
          <label for="dream-title">Title</label>
          <input
            id="dream-title"
            type="text"
            placeholder="Optional — e.g. The floating library"
            autocomplete="off"
            maxlength="80"
          />
        </div>

        <div class="field">
          <div class="field-head">
            <label for="dream-body">The dream</label>
            <span id="word-count" class="meta">0 words</span>
          </div>
          <div class="dream-stage" id="dream-stage">
            <textarea
              id="dream-body"
              class="dream-body"
              rows="9"
              placeholder=""
              spellcheck="true"
            ></textarea>
            <span class="pixel-caret" id="pixel-caret" aria-hidden="true"></span>
          </div>
        </div>

        <div class="composer-actions">
          <button id="save-dream" type="button">Catch Dream</button>
          <p class="hint">Tip: press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to catch</p>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="journal" aria-label="Saved dreams">
        <div class="journal-head">
          <h2>Journal</h2>
          <p id="dream-count" class="meta">0 saved</p>
        </div>
        <p id="empty-state" class="empty">
          Nothing here yet. Your first dream becomes the start of the archive.
        </p>
        <ul id="dream-list"></ul>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
